<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>

<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <table>
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </tr>

          <tr>
            <td>Stephen E. Robinson</td>
            <td>Believing Christ</td>
            <td>Brigham Young University</td>
            <td>1990</td>
          </tr>

          <tr>
            <td>Jeffery R. Holland</td>
            <td>Missionary Work and the Atonement</td>
            <td>Provo MTC</td>
            <td>2000</td>
          </tr>

          <tr>
            <td>Henry B Eyring</td>
            <td>Act in All Diligence</td>
            <td>General Conference Center</td>
            <td>2010</td>
          </tr>

        </table>

        <form>
          <label for="submit">Add a Devotional</label><br>
          
          <label for="speaker">Speaker:</label><br>
          <input type="text" id="speaker" name="speaker"><br>

          <label for="title">Title:</label><br>
          <input type="text" id="title" name="title"><br>

          <label for="location">Location:</label><br>
          <input type="text" id="location" name="location"><br>

          <label for="year">year:</label><br>
          <input type="number" id="year" name="year"><br>
          
          <input type="submit" value="Add Devotional">
        </form>
        
      </div>
    </main>
  </div>
</body>

</html>
