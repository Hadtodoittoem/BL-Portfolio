<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body {
            background: #e8eced;
            font-family: Arial, Helvetica, sans-serif;
        }
        
        .card {
            max-width:800px;
            width: 90%;
            margin: 40px auto;
            border: 8px solid black;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            background-image: url(images/christus.webp);
            background-size: cover;
            background-position: center;
        }

        .header {
            font-size: 1.5em;
            margin-bottom:  20px;
            color: white;
        }

        .quorum {
            font-size: 1.4em;
            margin-bottom: 15px;
            color: white;
        }

        .presidency-images {
            display:flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        /*had to look this one up*/
        .presidency-images img:nth-child(2) {
            width: 125px;
            height: 125px;
        }

        img {
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
        }

        img:hover {
            border: 5px solid #7700ff
        }

        .presidency-images img {
            width: 100px;
            height: 100px;

        }

        .quorum-images {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            justify-items: center;
        }

        .quorum-images img {
            width: 90px;
            height: 90px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">First Presidency</div>

        <div class="presidency-images">
            <img src="images/eyring.webp" alt="Elder Eyring">
            <img src="images/oaks.webp" alt="President Oaks">
            <img src="images/christofferson.webp" alt="Elder Christofferson">
        </div>

        <div class="quorum">Quorum of the Twelve Apostles</div>

        <div class="quorum-images">
            <img src="images/holland.webp" alt="Elder Holland">
            <img src="images/uchtdorf.webp" alt="Elder Uchtdorf">
            <img src="images/bednar.webp" alt="Elder Bednar">
            <img src="images/cook.webp" alt="Elder Cook">
            <img src="images/anderson.webp" alt="Elder Anderson">
            <img src="images/rasband.webp" alt="Elder Rasband">
            <img src="images/stevenson.webp" alt="Elder Stevenson">
            <img src="images/renlund.webp" alt="Elder Renlund">
            <img src="images/gong.webp" alt="Elder Gong">
            <img src="images/soares.webp" alt="Elder Soares">
            <img src="images/kearon.webp" alt="Elder Kearon">
            <img src="images/causse.webp" alt="Elder Causse">
        </div>
    </div>



</body>

</html>
