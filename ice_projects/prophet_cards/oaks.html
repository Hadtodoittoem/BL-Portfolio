<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dallin H. Oaks</title>

    <style>
        body {
            background: #FFECD7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .header {
            font-family: Helvetica, Arial, sans-serif;
            color: #fffffe;
            text-align: center;
            font-size: 2em;
            margin:10px;
        }

        .card {
            width: 400px;
            color: #008DB1;
            background:#008DB1;
            border: 5px #004E63 solid;
            border-radius: 15px;
        }

        .card-subtitle {
            font-family: Helvetica, Arial, sans-serif;
            color: #91e4fb;
            text-align: center;
            margin: 10px;
        }

        .card-subtitle a {
            color: #91e4fb;
            text-decoration: none;
        }

        .card-image img {
            margin: 40px;
            border: 10px white;

        }
        .card-stats {
            font-family: Helvetica, Arial, sans-serif;
            color: #fffffe;
            text-align: center;
        }

        .card-quote {
            font-family: "Brush Script MT";
            color: #FFD783;
            text-align: center;
            padding: 12px;
            font-size: 1.5em;
            background: #008DB1;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">
            Dallin H. Oaks
        </div>

        <div class="card-subtitle">
            <a href="churchofjesuschrist.org" target="_blank">
                <h3>18th President of The Church of Jesus Christ of Latter-day Saints</h3>
            </a>
        </div>

        <div class="card-image">
            <img src="images/oaks.webp" alt="Dallin H. Oaks">
        </div>

        <div class="card-stats">
            <p>Born: Aug 12, 1932</p>
            <p>Apostle: Apr 7, 1984</p>
            <p>Prophet: Oct 14,2025</p>
        </div>

        <div class="card-quote">
            <p>“The only permanent solution to the differences that divide us is for all of us to follow our Savior's
            teachings and to gradually become even as He is.” </p>
        </div>
    </div>

</body>

</html>
